version: '3.8'

services:
  # --- Kafka Service ---
  broker:
    image: confluentinc/cp-kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://broker:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://broker:29093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://broker:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:29093
      KAFKA_CLUSTER_ID: "4r4zNn9n4m3R4x8e8g1m6o890000"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    command:
      - /bin/sh
      - -c
      - |
        /usr/bin/kafka-storage format --ignore-formatted -t ${KAFKA_CLUSTER_ID} -c /etc/kafka/server.properties
        /etc/confluent/docker/run
    volumes:
      - kafka-data:/var/lib/kafka/data

  # --- Postgres Service ---
  postgres:
    container_name: db_tuto_postgres
    image: postgres:13
    ports: 
      - "5432:5432"
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=values_db
      - PGPASSWORD=password
    command: 
      - postgres 
      - -c 
      - wal_level=logical 
      - -c 
      - max_wal_senders=8 
      - -c 
      - max_replication_slots=8
    volumes:
      - postgres-data:/var/lib/postgresql/data

    # This ensures Debezium waits for the DB to be ready to accept connections
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d values_db"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s

  # --- Debezium Service ---
  debezium:
    container_name: db_tuto_debezium
    image: quay.io/debezium/connect
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: broker:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_statuses
      CONNECT_REST_ADVERTISED_HOST_NAME: debezium
    volumes:
      - ./connector.sh:/kafka/connector.sh
    
    # STARTUP ORDER
    depends_on:
      broker:
        condition: service_started # Just waits for container creation (standard)
      postgres:
        condition: service_healthy # Waits for pg_isready to pass (strict)

volumes:
  kafka-data:
  postgres-data: